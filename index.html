<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="hearts">
<span>❤️</span>
<span>💖</span>
<span>💕</span>
<span>💗</span>
<span>💝</span>
<span>❤️</span>
<span>💖</span>
<span>💕</span>
</div>

<div class="glass">

<h1 id="typing"></h1>

<p>Will you marry me? 💍</p>

<div class="buttons">
    <button id="yes">YES ❤️</button>
    <button id="no">NO 🙈</button>
</div>

</div>

<script>
const text = "Hi Samira ❤️";
let i = 0;

function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 120);
    }
}
type();

const yes = document.getElementById("yes");
const no = document.getElementById("no");

yes.onclick = function () {
    window.location.href = "proposal.html";
};

function moveButton() {
    const x = Math.random() * (window.innerWidth - no.offsetWidth - 20);
    const y = Math.random() * (window.innerHeight - no.offsetHeight - 20);

    no.style.position = "fixed";
    no.style.left = x + "px";
    no.style.top = y + "px";
}

no.addEventListener("mouseover", moveButton);
no.addEventListener("touchstart", moveButton);
no.addEventListener("click", moveButton);
</script>

</body>

</html>
