<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Marry Me? ❤️</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="hearts">
<span>❤️</span>
<span>💖</span>
<span>💕</span>
<span>💗</span>
<span>💝</span>
<span>❤️</span>
<span>💖</span>
<span>💕</span>
</div>

<div class="glass">

<h1>💍 Will You Marry Me? 💍</h1>

<p>

From the moment you came into my life,

everything became brighter.

You are my happiness,

my peace,

and my forever.

</p>

<div class="buttons">

<button id="yes">YES ❤️</button>

<button id="no">NO 🙈</button>

</div>

</div>

<script>

const yes=document.getElementById("yes");
const no=document.getElementById("no");

yes.onclick=function(){

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{

document.body.innerHTML=`

<div class="glass">

<h1>❤️ I Love You Samira ❤️</h1>

<p style="font-size:20px;line-height:2;">

My Dearest Samira,

<br><br>

Thank you for making every day beautiful.

I promise to stand by your side,

support you,

respect you,

and love you forever.

<br><br>

💍

Will you be my life partner?

<br><br>

Forever Yours,

<br>

❤️ Sahil ❤️

</p>

</div>

`;

},1500);

}

function move(){

const x=Math.random()*(window.innerWidth-140);

const y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",move);
no.addEventListener("click",move);

</script>

</body>
</html>
